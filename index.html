<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Music Agency | International Artist Management</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX Transpiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Playfair+Display:italic,wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        
        /* Custom scrollbar for a premium feel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #aa2b53;
        }

        /* Animation keyframes */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fadeIn 1s ease-out forwards;
        }
    </style>
</head>
<body class="bg-white text-black selection:bg-[#aa2b53] selection:text-white overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Define Lucide components for React
        const ChevronDown = () => <i data-lucide="chevron-down" style={{width: '12px'}}></i>;
        const Menu = () => <i data-lucide="menu"></i>;
        const X = () => <i data-lucide="x"></i>;
        const Facebook = ({ size = 18 }) => <i data-lucide="facebook" style={{width: size + 'px'}}></i>;
        const Instagram = ({ size = 18 }) => <i data-lucide="instagram" style={{width: size + 'px'}}></i>;
        const Mail = ({ size = 18 }) => <i data-lucide="mail" style={{width: size + 'px'}}></i>;
        const ExternalLink = ({ size = 12 }) => <i data-lucide="external-link" style={{width: size + 'px'}}></i>;
        const ArrowRight = ({ size = 16 }) => <i data-lucide="arrow-right" style={{width: size + 'px'}}></i>;

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [activeDropdown, setActiveDropdown] = useState(null);
            const [scrolled, setScrolled] = useState(false);

            const slides = [
                { url: "https://images.unsplash.com/photo-1520529611404-6153c5163979?auto=format&fit=crop&q=80&w=1600", title: "Maestro Arcadi Volodos" },
                { url: "https://images.unsplash.com/photo-1552422535-c45813c61732?auto=format&fit=crop&q=80&w=1600", title: "Jean-Claude Vanden Eynden" },
                { url: "https://images.unsplash.com/photo-1514119412350-e174d90d280e?auto=format&fit=crop&q=80&w=1600", title: "Salzburg Chamber Soloists" },
                { url: "https://images.unsplash.com/photo-1465821185615-93448359116c?auto=format&fit=crop&q=80&w=1600", title: "Philippe Raskin" },
                { url: "https://images.unsplash.com/photo-1511379938547-c1f69419868d?auto=format&fit=crop&q=80&w=1600", title: "Lavard Skou Larsen" }
            ];

            const newsItems = [
                {
                    date: "March 12, 2026",
                    title: "Exclusive Public Masterclass: Arcadi Volodos",
                    description: "A rare opportunity to witness the mastery of Arcadi Volodos in an exclusive public session in the heart of Paris.",
                    category: "Education"
                },
                {
                    date: "July 25, 2025",
                    title: "Jean-Claude Vanden Eynden Knighted",
                    description: "Celebrating the incredible achievement of Jean-Claude Vanden Eynden, recently knighted by King Philippe of Belgium.",
                    category: "Honors"
                },
                {
                    date: "February 15, 2025",
                    title: "Philippe Raskin named Artistic Director",
                    description: "We are proud to announce Philippe Raskin's appointment as Artistic Director of the International Music Festival Paris.",
                    category: "Appointments"
                }
            ];

            useEffect(() => {
                lucide.createIcons();
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                const timer = setInterval(() => {
                    setCurrentSlide((prev) => (prev === slides.length - 1 ? 0 : prev + 1));
                }, 4000);
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    clearInterval(timer);
                };
            }, [slides.length, currentPage]);

            const NavLink = ({ label, onClick, active }) => (
                <button 
                    onClick={onClick}
                    className={`text-[11px] uppercase tracking-[0.3em] font-semibold transition-all hover:text-[#aa2b53] ${active ? 'text-[#aa2b53]' : ''}`}
                >
                    {label}
                </button>
            );

            const NavDropdown = ({ label, children }) => (
                <div 
                    className="relative group py-2"
                    onMouseEnter={() => setActiveDropdown(label)}
                    onMouseLeave={() => setActiveDropdown(null)}
                >
                    <button className="flex items-center gap-1 text-[11px] uppercase tracking-[0.3em] font-semibold hover:text-[#aa2b53] transition-all">
                        {label} <ChevronDown />
                    </button>
                    {activeDropdown === label && (
                        <div className="absolute left-0 mt-4 w-72 bg-white shadow-2xl border-t border-[#aa2b53] animate-fade-in z-[200]">
                            <div className="py-4">
                                {children}
                            </div>
                        </div>
                    )}
                </div>
            );

            const DropdownItem = ({ href, label, external }) => (
                <a 
                    href={href} 
                    target={external ? "_blank" : "_self"}
                    rel={external ? "noopener noreferrer" : ""}
                    className="block px-8 py-4 hover:bg-gray-50 transition-colors group"
                >
                    <div className="flex justify-between items-center">
                        <span className="text-[10px] uppercase tracking-widest font-bold text-black group-hover:text-[#aa2b53] transition-colors leading-tight">{label}</span>
                        {external && <ExternalLink />}
                    </div>
                </a>
            );

            const renderHome = () => (
                <div className="animate-fade-in">
                    <section className="relative h-screen bg-black overflow-hidden">
                        {slides.map((slide, index) => (
                            <div
                                key={index}
                                className={`absolute inset-0 transition-all duration-1000 ease-in-out transform ${index === currentSlide ? 'opacity-100 scale-105' : 'opacity-0 scale-100'}`}
                            >
                                <img src={slide.url} alt={slide.title} className="w-full h-full object-cover opacity-60" />
                                {index >= 1 && (
                                    <div className="absolute bottom-16 right-16 bg-black/40 backdrop-blur-xl border-l-2 border-[#aa2b53] p-8 text-white min-w-[300px]">
                                        <span className="text-[10px] uppercase tracking-[0.4em] text-[#aa2b53] font-bold block mb-2">Featured Artist</span>
                                        <h2 className="text-3xl font-light tracking-tight">{slide.title}</h2>
                                        <div className="mt-4 flex items-center gap-2 group cursor-pointer">
                                            <span className="text-[10px] uppercase tracking-widest font-semibold group-hover:text-[#aa2b53] transition-colors">View Profile</span>
                                            <ArrowRight />
                                        </div>
                                    </div>
                                )}
                                {index === 0 && (
                                    <div className="absolute inset-0 flex flex-col justify-center items-center text-center px-6">
                                        <p className="text-[#aa2b53] font-bold tracking-[0.6em] uppercase text-xs mb-4">The Music Agency Presents</p>
                                        <h1 className="text-white text-6xl md:text-8xl font-black uppercase tracking-tighter mb-8 max-w-5xl leading-[0.9]">Arcadi Volodos <br/><span className="font-light italic lowercase font-serif">Masterclass</span></h1>
                                        <button className="px-12 py-5 bg-white text-black font-bold uppercase tracking-[0.2em] text-xs hover:bg-[#aa2b53] hover:text-white transition-all">Discover More</button>
                                    </div>
                                )}
                            </div>
                        ))}
                        <div className="absolute bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-6 z-20">
                            {slides.map((_, idx) => (
                                <button key={idx} onClick={() => setCurrentSlide(idx)} className="py-4">
                                    <div className={`h-[2px] transition-all duration-500 ${idx === currentSlide ? 'w-12 bg-[#aa2b53]' : 'w-4 bg-white/30'}`} />
                                </button>
                            ))}
                        </div>
                    </section>

                    <section className="py-32 px-6 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid lg:grid-cols-12 gap-16 items-start">
                                <div className="lg:col-span-4 sticky top-32">
                                    <span className="text-[#aa2b53] font-black uppercase tracking-[0.3em] text-xs mb-4 block">The Newsroom</span>
                                    <h2 className="text-6xl font-black uppercase tracking-tighter leading-none mb-8">Latest<br/><span className="text-[#aa2b53]">Stories</span></h2>
                                    <p className="text-gray-500 font-serif italic text-lg leading-relaxed mb-10">Discover the latest achievements, appointments, and world-class events from our roster of artists.</p>
                                    <button onClick={() => setCurrentPage('news')} className="group flex items-center gap-4 text-[11px] font-black uppercase tracking-[0.2em] border-b-2 border-black pb-2 hover:text-[#aa2b53] hover:border-[#aa2b53] transition-all">
                                        Explore All News <ArrowRight />
                                    </button>
                                </div>
                                <div className="lg:col-span-8 grid md:grid-cols-2 gap-x-12 gap-y-20">
                                    {newsItems.map((item, idx) => (
                                        <div key={idx} className={`group cursor-pointer ${idx === 0 ? 'md:col-span-2' : ''}`}>
                                            <div className="relative aspect-video overflow-hidden bg-gray-100 mb-8">
                                                <img src={`https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&q=80&w=800&sig=${idx}`} className="w-full h-full object-cover grayscale transition-all duration-700 group-hover:grayscale-0 group-hover:scale-105" />
                                                <div className="absolute top-0 left-0 p-6">
                                                    <span className="bg-black text-white px-3 py-1 text-[9px] font-bold uppercase tracking-widest">{item.category}</span>
                                                </div>
                                            </div>
                                            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] mb-3">{item.date}</p>
                                            <h3 className={`font-bold uppercase tracking-tight group-hover:text-[#aa2b53] transition-colors ${idx === 0 ? 'text-3xl mb-4' : 'text-xl mb-3'}`}>{item.title}</h3>
                                            <p className="text-gray-500 text-sm leading-relaxed font-serif">{item.description}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <nav className={`fixed top-0 w-full z-[100] transition-all duration-700 ${scrolled || currentPage !== 'home' ? 'bg-white shadow-sm border-b py-4' : 'bg-transparent py-8 text-white'}`}>
                        <div className="max-w-[1600px] mx-auto px-8">
                            <div className="flex items-center justify-between">
                                <div className="hidden lg:flex flex-1 items-center gap-10">
                                    <NavLink label="Home" onClick={() => setCurrentPage('home')} active={currentPage === 'home'} />
                                    <NavDropdown label="Festivals">
                                        <DropdownItem href="https://masterclass-volodos.com" label="Arcadi Volodos - Masterclass" external />
                                        <DropdownItem href="https://cfipc.com" label="César Franck International Piano Competition" external />
                                        <DropdownItem href="https://imfparis.fr" label="International Music Festival Paris" external />
                                        <DropdownItem href="https://cfipc.com" label="César Franck Young Talents & Orchestra" external />
                                    </NavDropdown>
                                    <NavDropdown label="Artists">
                                        <DropdownItem href="#" label="Salzburg Chamber Soloists" />
                                        <DropdownItem href="#" label="Jean-Claude Vanden Eynden" />
                                        <DropdownItem href="#" label="Philippe Raskin" />
                                        <DropdownItem href="#" label="Lavard Skou Larsen" />
                                    </NavDropdown>
                                </div>
                                <div className="flex flex-col items-center cursor-pointer px-12 group shrink-0" onClick={() => setCurrentPage('home')}>
                                    <img src="logo.png" alt="TMA" className={`h-12 mb-1 object-contain transition-all duration-700 ${scrolled || currentPage !== 'home' ? '' : 'brightness-0 invert'}`} onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}/>
                                    <div className="hidden flex-col items-center">
                                        <span className="text-3xl font-black tracking-[0.3em] uppercase leading-none group-hover:text-[#aa2b53]">TMA</span>
                                        <span className="text-[8px] tracking-[0.5em] uppercase font-bold opacity-60">The Music Agency</span>
                                    </div>
                                </div>
                                <div className="hidden lg:flex flex-1 justify-end items-center gap-10">
                                    <NavLink label="News" onClick={() => setCurrentPage('news')} active={currentPage === 'news'} />
                                    <NavLink label="Contact" onClick={() => setCurrentPage('contact')} active={currentPage === 'contact'} />
                                </div>
                                <button className="lg:hidden p-2" onClick={() => setIsMenuOpen(true)}>
                                    <Menu />
                                </button>
                            </div>
                        </div>
                    </nav>

                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-white z-[200] p-8 flex flex-col animate-fade-in overflow-y-auto">
                            <div className="flex justify-between items-center mb-16">
                                <span className="text-2xl font-black tracking-widest uppercase">TMA</span>
                                <button onClick={() => setIsMenuOpen(false)} className="p-2 bg-black text-white rounded-full"><X /></button>
                            </div>
                            <div className="flex flex-col gap-8">
                                <button onClick={() => {setCurrentPage('home'); setIsMenuOpen(false)}} className="text-4xl font-black uppercase tracking-tighter text-left">Home</button>
                                <div className="space-y-4">
                                    <p className="text-[#aa2b53] font-black uppercase tracking-widest text-xs">Festivals</p>
                                    <div className="flex flex-col gap-4 pl-4 border-l border-gray-100">
                                        <a href="https://masterclass-volodos.com" target="_blank" className="text-xl font-light">Arcadi Volodos - Masterclass</a>
                                        <a href="https://cfipc.com" target="_blank" className="text-xl font-light">César Franck IPC</a>
                                    </div>
                                </div>
                                <button onClick={() => {setCurrentPage('news'); setIsMenuOpen(false)}} className="text-4xl font-black uppercase tracking-tighter text-left">News</button>
                                <button onClick={() => {setCurrentPage('contact'); setIsMenuOpen(false)}} className="text-4xl font-black uppercase tracking-tighter text-left">Contact</button>
                            </div>
                        </div>
                    )}

                    {currentPage === 'home' ? renderHome() : (
                        <div className="pt-40 animate-fade-in">
                            {currentPage === 'news' && (
                                <div className="max-w-4xl mx-auto px-6 pb-32">
                                    <h1 className="text-7xl font-black uppercase tracking-tighter mb-20">Archive of <span className="text-[#aa2b53]">Excellence</span></h1>
                                    <div className="space-y-24">
                                        {newsItems.map((item, idx) => (
                                            <div key={idx} className="group border-b border-gray-100 pb-12">
                                                <p className="text-[11px] font-bold text-[#aa2b53] uppercase tracking-[0.3em] mb-4">{item.date} — {item.category}</p>
                                                <h2 className="text-4xl font-bold uppercase tracking-tight mb-6 group-hover:text-[#aa2b53] transition-colors">{item.title}</h2>
                                                <p className="text-gray-500 font-serif text-lg leading-relaxed mb-8">{item.description}</p>
                                                <button className="flex items-center gap-2 font-black uppercase tracking-widest text-[10px] bg-black text-white px-6 py-3 hover:bg-[#aa2b53] transition-all">Read Full Article <ArrowRight /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {currentPage === 'contact' && (
                                <div className="max-w-6xl mx-auto px-6 pb-32 grid md:grid-cols-2 gap-24">
                                    <div>
                                        <h1 className="text-7xl font-black uppercase tracking-tighter mb-12">Start the <span className="text-[#aa2b53]">Dialogue</span></h1>
                                        <p className="text-xl font-serif italic text-gray-500 mb-12">Global representation for world-class artists. Let's discuss your next project or booking.</p>
                                        <div className="space-y-8">
                                            <div><p className="text-[10px] font-black uppercase tracking-[0.4em] text-[#aa2b53] mb-2">Primary Office</p><p className="text-2xl font-light">Brussels, Belgium</p></div>
                                            <div><p className="text-[10px] font-black uppercase tracking-[0.4em] text-[#aa2b53] mb-2">General Inquiries</p><p className="text-2xl font-light">office@themusicagency.eu</p></div>
                                        </div>
                                    </div>
                                    <div className="bg-gray-50 p-12">
                                        <form className="space-y-6">
                                            <div className="grid md:grid-cols-2 gap-6">
                                                <input type="text" placeholder="FULL NAME" className="bg-transparent border-b border-gray-300 py-4 focus:border-[#aa2b53] focus:outline-none text-sm tracking-widest uppercase" />
                                                <input type="email" placeholder="EMAIL ADDRESS" className="bg-transparent border-b border-gray-300 py-4 focus:border-[#aa2b53] focus:outline-none text-sm tracking-widest uppercase" />
                                            </div>
                                            <input type="text" placeholder="SUBJECT" className="w-full bg-transparent border-b border-gray-300 py-4 focus:border-[#aa2b53] focus:outline-none text-sm tracking-widest uppercase" />
                                            <textarea rows="4" placeholder="MESSAGE" className="w-full bg-transparent border-b border-gray-300 py-4 focus:border-[#aa2b53] focus:outline-none text-sm tracking-widest uppercase resize-none"></textarea>
                                            <button className="w-full py-5 bg-black text-white font-black uppercase tracking-[0.3em] text-[11px] hover:bg-[#aa2b53] transition-all">Submit Inquiry</button>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <footer className="bg-black text-white py-24 px-8">
                        <div className="max-w-[1600px] mx-auto flex flex-col items-center">
                            <div className="mb-12 flex flex-col items-center cursor-pointer" onClick={() => setCurrentPage('home')}>
                                <img src="logo.png" alt="The Music Agency" className="h-16 mb-4 object-contain brightness-0 invert" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}/>
                                <div className="hidden flex-col items-center">
                                    <span className="text-4xl font-black tracking-[0.3em] uppercase leading-none">TMA</span>
                                    <div className="h-[2px] w-8 bg-[#aa2b53] my-2"></div>
                                    <span className="text-[10px] tracking-[0.5em] uppercase font-bold opacity-60">The Music Agency</span>
                                </div>
                            </div>
                            <div className="flex gap-8 mb-12">
                                <a href="https://www.facebook.com/themusicagency.eu" target="_blank" className="w-14 h-14 rounded-full border border-white/10 flex items-center justify-center hover:border-[#aa2b53] hover:text-[#aa2b53] transition-all"><Facebook size={22} /></a>
                                <a href="https://www.instagram.com/the.music.agency" target="_blank" className="w-14 h-14 rounded-full border border-white/10 flex items-center justify-center hover:border-[#aa2b53] hover:text-[#aa2b53] transition-all"><Instagram size={22} /></a>
                                <a href="mailto:office@themusicagency.eu" className="w-14 h-14 rounded-full border border-white/10 flex items-center justify-center hover:border-[#aa2b53] hover:text-[#aa2b53] transition-all"><Mail size={22} /></a>
                            </div>
                            <div className="pt-12 border-t border-white/5 w-full text-center">
                                <p className="text-[10px] uppercase tracking-[0.4em] text-gray-500">© 2026 The Music Agency. Designed for Excellence.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
