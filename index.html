<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Music Agency | International Artist Management</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX Transpiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Playfair+Display:italic,wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        
        /* Custom scrollbar for a premium feel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #aa2b53;
        }

        /* Animation keyframes */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        /* Hero Text readability helper since black filter is removed */
        .hero-text-shadow {
            text-shadow: 0px 2px 10px rgba(0,0,0,0.3);
        }

        /* Logo white filter : turns everything white on dark backgrounds */
        .logo-white-filter {
            filter: brightness(0) invert(1);
        }

        /* Force social icons to be white and have proper stroke */
        .social-icon-white svg {
            stroke: #ffffff !important;
            color: #ffffff !important;
            transition: stroke 0.3s ease;
        }
        
        .social-icon-white:hover svg {
            stroke: #aa2b53 !important;
            color: #aa2b53 !important;
        }
    </style>
</head>
<body class="bg-white text-black selection:bg-[#aa2b53] selection:text-white overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Native SVG components to ensure 100% visibility
        const ChevronDown = () => (
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        );
        const Menu = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        );
        const X = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );
        const Facebook = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
        );
        const Instagram = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        );
        const Mail = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        );
        const ExternalLink = ({ size = 12 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        );
        const ArrowRight = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        );

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [activeDropdown, setActiveDropdown] = useState(null);
            const [scrolled, setScrolled] = useState(false);
            const dropdownTimer = useRef(null);

            const slides = [
                { url: "volodos.png", title: "Maestro Arcadi Volodos", link: "https://masterclass-volodos.com", external: true },
                { url: "philippe.png", title: "Philippe Raskin", link: "https://cfipc.github.io/themusicagency.eu/philippe-raskin", external: false },
                { url: "jc.png", title: "Jean-Claude Vanden Eynden", link: "https://cfipc.github.io/themusicagency.eu/jean-claude-vanden-eynden", external: false },
                { url: "lavard.png", title: "Lavard Skou Larsen", link: "https://cfipc.github.io/themusicagency.eu/lavard-skou-larsen", external: false },
                { url: "scs.png", title: "Salzburg Chamber Soloists", link: "https://cfipc.github.io/themusicagency.eu/salzburg-chamber-soloists", external: false }
            ];

            const newsItems = [
                {
                    date: "March 12, 2026",
                    title: "Exclusive Public Masterclass : Arcadi Volodos",
                    description: "A rare opportunity to witness the mastery of Arcadi Volodos in an exclusive public session in the heart of Paris.",
                    image: "volodos_news.png",
                    category: "Education"
                },
                {
                    date: "February 26, 2026",
                    title: "Jean-Claude Vanden Eynden : 'Citizen of Honour'",
                    description: "Chevalier Jean-Claude Vanden Eynden was awarded the 'Citizen of Honour' medal by the municipality of Woluwe-Saint-Pierre for his major international influence and exceptional contribution to cultural life.",
                    image: "jean-claude_news.png",
                    category: "Honors"
                },
                {
                    date: "September 2025",
                    title: "Philippe Raskin appointed Professor at IMEP Namur",
                    description: "We are proud to announce that Philippe Raskin has been officially appointed as Professor at the prestigious Institut Royal Supérieur de Musique et de Pédagogie (IMEP) in Namur.",
                    image: "philippe_news.png",
                    category: "Appointments"
                }
            ];

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                
                const timer = setInterval(() => {
                    if (currentPage === 'home') {
                        setCurrentSlide((prev) => (prev === slides.length - 1 ? 0 : prev + 1));
                    }
                }, 6000);
                
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    clearInterval(timer);
                };
            }, [slides.length, currentPage]);

            const handleMouseEnter = (label) => {
                if (dropdownTimer.current) clearTimeout(dropdownTimer.current);
                setActiveDropdown(label);
            };

            const handleMouseLeave = () => {
                dropdownTimer.current = setTimeout(() => {
                    setActiveDropdown(null);
                }, 600);
            };

            const NavLink = ({ label, onClick, active }) => (
                <button 
                    onClick={onClick}
                    className={`text-[11px] uppercase tracking-[0.3em] font-semibold transition-all hover:text-[#aa2b53] ${active ? 'text-[#aa2b53]' : (scrolled || currentPage !== 'home' ? 'text-black' : 'text-white')}`}
                >
                    {label}
                </button>
            );

            const NavDropdown = ({ label, children }) => (
                <div 
                    className="relative group py-2"
                    onMouseEnter={() => handleMouseEnter(label)}
                    onMouseLeave={handleMouseLeave}
                >
                    <button className={`flex items-center gap-1 text-[11px] uppercase tracking-[0.3em] font-semibold hover:text-[#aa2b53] transition-all ${scrolled || currentPage !== 'home' ? 'text-black' : 'text-white'}`}>
                        {label} <span className="inline-block ml-1"><ChevronDown /></span>
                    </button>
                    {activeDropdown === label && (
                        <div className="absolute left-0 mt-4 w-72 bg-white shadow-2xl border-t border-[#aa2b53] animate-fade-in z-[200]">
                            <div className="py-4">
                                {children}
                            </div>
                        </div>
                    )}
                </div>
            );

            const DropdownItem = ({ href, label, external }) => (
                <a 
                    href={href} 
                    target={external ? "_blank" : "_self"}
                    rel={external ? "noopener noreferrer" : ""}
                    className="block px-8 py-4 hover:bg-gray-50 transition-colors group"
                >
                    <div className="flex justify-between items-center">
                        <span className="text-[10px] uppercase tracking-widest font-bold text-black group-hover:text-[#aa2b53] transition-colors leading-tight">{label}</span>
                        {external && <ExternalLink />}
                    </div>
                </a>
            );

            const renderHome = () => (
                <div className="animate-fade-in">
                    <section className="relative h-screen bg-black overflow-hidden">
                        {slides.map((slide, index) => (
                            <div
                                key={index}
                                className={`absolute inset-0 transition-all duration-1000 ease-in-out transform ${index === currentSlide ? 'opacity-100 scale-105 z-10 pointer-events-auto' : 'opacity-0 scale-100 z-0 pointer-events-none'}`}
                            >
                                <img src={slide.url} alt={slide.title} className="w-full h-full object-cover opacity-100" onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1520529611404-6153c5163979?auto=format&fit=crop&q=80&w=1600"; }} />
                                
                                {index >= 1 && (
                                    <a 
                                        href={slide.link} 
                                        className="absolute bottom-12 right-6 md:bottom-16 md:right-16 bg-black/40 backdrop-blur-xl border-l-2 border-[#aa2b53] p-6 md:p-8 text-white min-w-[260px] md:min-w-[300px] hover:bg-black/60 transition-all cursor-pointer group"
                                    >
                                        <span className="text-[10px] uppercase tracking-[0.4em] text-[#aa2b53] font-bold block mb-2">Featured Artist</span>
                                        <h2 className="text-2xl md:text-3xl font-light tracking-tight hero-text-shadow">{slide.title}</h2>
                                        <div className="mt-4 flex items-center gap-2 group-hover:text-[#aa2b53] transition-colors">
                                            <span className="text-[10px] uppercase tracking-widest font-semibold transition-colors">View Profile</span>
                                            <ArrowRight />
                                        </div>
                                    </a>
                                )}
                                {index === 0 && (
                                    <div className="absolute inset-0 flex flex-col justify-center items-center text-center px-6">
                                        <p className="text-[#aa2b53] font-bold tracking-[0.6em] uppercase text-[10px] md:text-xs mb-4 hero-text-shadow">The Music Agency Presents</p>
                                        <h1 className="text-white text-4xl md:text-8xl font-black uppercase tracking-tighter mb-8 max-w-5xl leading-tight md:leading-[0.9] hero-text-shadow">Arcadi Volodos <br/><span className="font-light italic lowercase font-serif">Masterclass</span></h1>
                                        <a 
                                            href={slide.link} 
                                            target={slide.external ? "_blank" : "_self"}
                                            rel={slide.external ? "noopener noreferrer" : ""}
                                            className="px-8 md:px-12 py-4 md:py-5 bg-white text-black font-bold uppercase tracking-[0.2em] text-[10px] md:text-xs hover:bg-[#aa2b53] hover:text-white transition-all shadow-lg"
                                        >
                                            Discover More
                                        </a>
                                    </div>
                                )}
                            </div>
                        ))}
                        <div className="absolute bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-4 md:gap-6 z-20">
                            {slides.map((_, idx) => (
                                <button key={idx} onClick={() => setCurrentSlide(idx)} className="py-4">
                                    <div className={`h-[2px] transition-all duration-500 ${idx === currentSlide ? 'w-8 md:w-12 bg-[#aa2b53]' : 'w-2 md:w-4 bg-white/30'}`} />
                                </button>
                            ))}
                        </div>
                    </section>

                    <section className="py-20 md:py-32 px-6 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col lg:grid lg:grid-cols-12 gap-12 md:gap-16 items-start">
                                <div className="w-full lg:col-span-4 lg:sticky lg:top-32 mb-8 lg:mb-0">
                                    <span className="text-[#aa2b53] font-black uppercase tracking-[0.3em] text-xs mb-4 block">The Newsroom</span>
                                    <h2 className="text-4xl md:text-6xl font-black uppercase tracking-tighter leading-none mb-6 md:mb-8">Latest<br/><span className="text-[#aa2b53]">Stories</span></h2>
                                    <p className="text-gray-500 font-serif italic text-base md:text-lg leading-relaxed mb-8 md:mb-10 max-w-md">Discover the latest achievements, appointments, and world-class events from our roster of artists.</p>
                                    <button onClick={() => window.location.href = 'https://cfipc.github.io/themusicagency.eu/news'} className="group flex items-center gap-4 text-[11px] font-black uppercase tracking-[0.2em] border-b-2 border-black pb-2 hover:text-[#aa2b53] hover:border-[#aa2b53] transition-all">
                                        Explore All News <span className="ml-1"><ArrowRight /></span>
                                    </button>
                                </div>
                                
                                <div className="w-full lg:col-span-8 grid md:grid-cols-2 gap-x-8 md:gap-x-12 gap-y-16 md:gap-y-20">
                                    {newsItems.map((item, idx) => (
                                        <div key={idx} className={`group cursor-pointer ${idx === 0 ? 'md:col-span-2' : ''}`} onClick={() => window.location.href = 'https://cfipc.github.io/themusicagency.eu/news'}>
                                            <div className="relative aspect-video overflow-hidden bg-gray-100 mb-6 md:mb-8">
                                                <img 
                                                    src={item.image} 
                                                    className="w-full h-full object-cover grayscale transition-all duration-700 group-hover:grayscale-0 group-hover:scale-105" 
                                                    onError={(e) => { e.target.src = `https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&q=80&w=800&sig=${idx}`; }}
                                                />
                                                <div className="absolute top-0 left-0 p-4 md:p-6">
                                                    <span className="bg-black text-white px-3 py-1 text-[9px] font-bold uppercase tracking-widest">{item.category}</span>
                                                </div>
                                            </div>
                                            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] mb-3">{item.date}</p>
                                            <h3 className={`font-bold uppercase tracking-tight group-hover:text-[#aa2b53] transition-colors ${idx === 0 ? 'text-2xl md:text-3xl mb-4' : 'text-xl mb-3'}`}>{item.title}</h3>
                                            <p className="text-gray-500 text-sm leading-relaxed font-serif">{item.description}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <nav className={`fixed top-0 w-full z-[100] transition-all duration-700 ${scrolled || currentPage !== 'home' ? 'bg-white shadow-sm border-b py-4' : 'bg-transparent py-8 text-white'}`}>
                        <div className="max-w-[1600px] mx-auto px-8">
                            <div className="flex items-center justify-between h-20 md:h-24">
                                <div className="hidden lg:flex flex-1 items-center gap-10">
                                    <NavLink label="Home" onClick={() => window.location.href = 'https://cfipc.github.io/themusicagency.eu/'} active={currentPage === 'home'} />
                                    <NavDropdown label="Festivals">
                                        <DropdownItem href="https://masterclass-volodos.com" label="Arcadi Volodos - Masterclass" external />
                                        <DropdownItem href="https://cfipc.com" label="César Franck International Piano Competition" external />
                                        <DropdownItem href="https://imfparis.fr" label="International Music Festival Paris" external />
                                        <DropdownItem href="https://cfipc.com/spring-masterclass/" label="César Franck Young Talents & Orchestra" external />
                                    </NavDropdown>
                                    <NavDropdown label="Artists">
                                        <DropdownItem href="https://cfipc.github.io/themusicagency.eu/salzburg-chamber-soloists" label="Salzburg Chamber Soloists" />
                                        <DropdownItem href="https://cfipc.github.io/themusicagency.eu/jean-claude-vanden-eynden" label="Jean-Claude Vanden Eynden" />
                                        <DropdownItem href="https://cfipc.github.io/themusicagency.eu/philippe-raskin" label="Philippe Raskin" />
                                        <DropdownItem href="https://cfipc.github.io/themusicagency.eu/lavard-skou-larsen" label="Lavard Skou Larsen" />
                                    </NavDropdown>
                                </div>
                                <div className="flex flex-col items-center cursor-pointer px-6 md:px-12 group shrink-0" onClick={() => window.location.href = 'https://cfipc.github.io/themusicagency.eu/'}>
                                    <img 
                                        src="logo.png" 
                                        alt="TMA" 
                                        className={`h-28 md:h-40 mb-1 object-contain transition-all duration-700 ${(!scrolled && currentPage === 'home') ? 'logo-white-filter' : ''}`} 
                                        onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}
                                    />
                                    <div className="hidden flex-col items-center">
                                        <span className={`text-2xl md:text-3xl font-black tracking-[0.3em] uppercase leading-none group-hover:text-[#aa2b53] ${scrolled || currentPage !== 'home' ? 'text-black' : 'text-white'}`}>TMA</span>
                                        <span className={`text-[8px] tracking-[0.5em] uppercase font-bold opacity-60 ${scrolled || currentPage !== 'home' ? 'text-black' : 'text-white'}`}>The Music Agency</span>
                                    </div>
                                </div>
                                <div className="hidden lg:flex flex-1 justify-end items-center gap-10">
                                    <NavLink label="News" onClick={() => window.location.href = 'https://cfipc.github.io/themusicagency.eu/news'} active={currentPage === 'news'} />
                                    <NavLink label="Contact" onClick={() => window.location.href = 'https://cfipc.github.io/themusicagency.eu/contact'} active={currentPage === 'contact'} />
                                </div>
                                <button className={`lg:hidden p-2 ${scrolled || currentPage !== 'home' ? 'text-black' : 'text-white'}`} onClick={() => setIsMenuOpen(true)}>
                                    <Menu />
                                </button>
                            </div>
                        </div>
                    </nav>

                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-white z-[200] p-8 flex flex-col animate-fade-in overflow-y-auto">
                            <div className="flex justify-between items-center mb-16">
                                <span className="text-2xl font-black tracking-widest uppercase">TMA</span>
                                <button onClick={() => setIsMenuOpen(false)} className="p-2 bg-black text-white rounded-full"><X /></button>
                            </div>
                            <div className="flex flex-col gap-8">
                                <button onClick={() => window.location.href = 'https://cfipc.github.io/themusicagency.eu/'} className="text-4xl font-black uppercase tracking-tighter text-left">Home</button>
                                <div className="space-y-4">
                                    <p className="text-[#aa2b53] font-black uppercase tracking-widest text-xs">Festivals</p>
                                    <div className="flex flex-col gap-4 pl-4 border-l border-gray-100">
                                        <a href="https://masterclass-volodos.com" target="_blank" className="text-xl font-light">Arcadi Volodos - Masterclass</a>
                                        <a href="https://cfipc.com" target="_blank" className="text-xl font-light">César Franck IPC</a>
                                    </div>
                                </div>
                                <button onClick={() => window.location.href = 'https://cfipc.github.io/themusicagency.eu/news'} className="text-4xl font-black uppercase tracking-tighter text-left">News</button>
                                <button onClick={() => window.location.href = 'https://cfipc.github.io/themusicagency.eu/contact'} className="text-4xl font-black uppercase tracking-tighter text-left">Contact</button>
                            </div>
                        </div>
                    )}

                    {currentPage === 'home' ? renderHome() : null}

                    <footer className="bg-black text-white py-16 md:py-24 px-8">
                        <div className="max-w-[1600px] mx-auto flex flex-col items-center">
                            <div className="mb-12 flex flex-col items-center group cursor-pointer" onClick={() => window.location.href = 'https://cfipc.github.io/themusicagency.eu/'}>
                                <img 
                                    src="logo.png" 
                                    alt="The Music Agency" 
                                    className="h-32 md:h-48 mb-4 object-contain logo-white-filter" 
                                    onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}
                                />
                                <div className="hidden flex-col items-center">
                                    <span className="text-3xl md:text-4xl font-black tracking-[0.3em] uppercase leading-none">TMA</span>
                                    <div className="h-[2px] w-8 bg-[#aa2b53] my-2"></div>
                                    <span className="text-[10px] tracking-[0.5em] uppercase font-bold opacity-60">The Music Agency</span>
                                </div>
                            </div>
                            <div className="flex gap-6 md:gap-8 mb-12">
                                <a href="https://www.facebook.com/themusicagency.eu" target="_blank" className="social-icon-white w-12 h-12 md:w-14 md:h-14 rounded-full border border-white flex items-center justify-center text-white hover:border-[#aa2b53] transition-all group/social">
                                    <Facebook size={22} />
                                </a>
                                <a href="https://www.instagram.com/the.music.agency" target="_blank" className="social-icon-white w-12 h-12 md:w-14 md:h-14 rounded-full border border-white flex items-center justify-center text-white hover:border-[#aa2b53] transition-all group/social">
                                    <Instagram size={22} />
                                </a>
                                <a href="mailto:office@themusicagency.eu" className="social-icon-white w-12 h-12 md:w-14 md:h-14 rounded-full border border-white flex items-center justify-center text-white hover:border-[#aa2b53] transition-all group/social">
                                    <Mail size={22} />
                                </a>
                            </div>
                            <div className="pt-12 border-t border-white/5 w-full text-center">
                                <p className="text-[10px] uppercase tracking-[0.4em] text-gray-500">© 2026 The Music Agency. Designed for Excellence.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
